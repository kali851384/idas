<!DOCTYPE html>

<html>
    <head>
        <!--DO NOT TOUCH-->
        <link href="style.css" type="text/css" rel="stylesheet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">
        <script src="script.js"></script>
    </head>

    <body>
        <div id="logInWrapper"> 
<!--Anmelde Formular--> 
            <form id="logInForm" action="#" method="post">
                <div id="logInEmailWrapper" class="logInWrapper">
                    <label id="logInLabelEmail" class="logInLabel">Email</label>
                    <input type="email" name="logInEmail" id="logInEmail" class="logInInput" /> <br />
                </div>

                <div id="logInPasswordWrapper" class="logInWrapper">
                    <label id="logInLabelPassword" class="logInLabel">Passwort</label>
                    <input type="password" name="logInPassword" id="logInPassword" class="logInInput"/>
                </div>

                <input type="submit" value="Submit" name="logInSubmit" id="logInSubmit" class="logInInput"/>  
            </form>
        </div>
    </body>
</html>
